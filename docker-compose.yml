services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=ses,sns
      - DEBUG=1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "./localstack:/var/lib/localstack"

  chrome:
    image: selenium/standalone-chromium:latest
    ports:
      - "4444:4444"   # Selenium WebDriver
      - "7900:7900"   # noVNC (browser preview at http://localhost:7900, password: secret)
    shm_size: "2g"    # prevents Chrome tab crashes under load
    environment:
      - SE_NODE_MAX_SESSIONS=3
      - SE_VNC_NO_PASSWORD=1

  app:
    build: .
    command: bundle exec rspec
    depends_on:
      - localstack
      - chrome
    volumes:
      - .:/usr/src/app
      - bundle:/usr/local/bundle
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_REGION=us-east-1
      - SELENIUM_REMOTE_URL=http://chrome:4444/wd/hub
      - CAPYBARA_SERVER_HOST=app   # Capybara binds to this hostname so Chrome can reach it

volumes:
  bundle:
